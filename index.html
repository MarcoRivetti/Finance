<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-title" content="Budget">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" href="apple-touch-icon.png">
  <title>Budget Tracker</title>
  <style>
    :root {
      --bg: #000000;
      --card: #1c1c1e;
      --card2: #2c2c2e;
      --ink: #f2f2f0;
      --muted: #98989f;
      --muted2: #5a5a5f;
      --border: #2c2c2e;
      --hairline: rgba(120,120,128,0.32);
      --green: #30d158;
      --green-bg: #10331d;
      --red: #ff453a;
      --red-bg: #3a1512;
      --amber: #ff9f0a;
      --amber-bg: #3a2708;
      --blue: #0a84ff;
      --blue-bg: #0a2540;
      --radius: 16px;
      --radius-sm: 11px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { background: var(--bg); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.4;
      max-width: 520px;
      margin: 0 auto;
      padding: 0 0 calc(84px + env(safe-area-inset-bottom, 0px)) 0;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
    }
    .header {
      background: rgba(0,0,0,0.7);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      backdrop-filter: saturate(180%) blur(20px);
      color: var(--ink);
      padding: calc(env(safe-area-inset-top, 0px) + 14px) 20px 10px;
      position: sticky; top: 0; z-index: 100;
      border-bottom: 0.5px solid var(--hairline);
    }
    .header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.4px; }
    .header-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .tabs {
      display: flex;
      background: rgba(22,22,24,0.92);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      backdrop-filter: saturate(180%) blur(20px);
      border-top: 0.5px solid var(--hairline);
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 99;
      margin: 0 auto;
      max-width: 520px;
      padding: 8px max(env(safe-area-inset-left, 0px), 6px) max(env(safe-area-inset-bottom, 0px), 14px) max(env(safe-area-inset-right, 0px), 6px);
    }
    .tab {
      flex: 1; padding: 4px 2px; text-align: center;
      font-size: 10px; font-weight: 500; color: var(--muted);
      border: none; background: none; cursor: pointer;
      transition: color 0.15s;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .tab svg { width: 25px; height: 25px; display: block; }
    .tab svg * { fill: var(--muted); transition: fill 0.15s; }
    .tab.active { color: var(--blue); }
    .tab.active svg * { fill: var(--blue); }
    .panel { display: none; padding: 16px 16px 8px; }
    .panel.active { display: block; }

    .metric-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .metric-card { background: var(--card); border-radius: var(--radius); padding: 15px 16px; }
    .mc-val { font-size: 26px; font-weight: 700; letter-spacing: -0.6px; }
    .mc-val.green { color: var(--green); }
    .mc-val.red { color: var(--red); }
    .mc-val.amber { color: var(--amber); }
    .mc-lbl { font-size: 12px; color: var(--muted); margin-top: 3px; letter-spacing: -0.1px; }

    .hero { border-radius: var(--radius); margin-bottom: 12px; padding: 20px 18px 17px; }
    .hero.ok { background: linear-gradient(135deg, #1c7a34, #30d158); }
    .hero.warn { background: linear-gradient(135deg, #a85c00, #ff9f0a); }
    .hero.bad { background: linear-gradient(135deg, #931009, #ff453a); }
    .hero-lbl { font-size: 13px; color: rgba(255,255,255,0.85); font-weight: 500; }
    .hero-val { font-size: 46px; font-weight: 700; letter-spacing: -1.6px; margin: 3px 0 6px; color: #fff; }
    .hero-sub { font-size: 13px; color: rgba(255,255,255,0.9); }
    .hero-sub2 { font-size: 13px; color: rgba(255,255,255,0.68); margin-top: 1px; }

    .section-title { font-size: 13px; font-weight: 600; letter-spacing: -0.1px; color: var(--muted); padding: 18px 6px 7px; }
    .card { background: var(--card); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
    .card-header { display: flex; align-items: center; justify-content: space-between; padding: 15px 16px; cursor: pointer; }
    .card-header:active { background: var(--card2); }
    .card-title { font-size: 16px; font-weight: 600; letter-spacing: -0.2px; }
    .card-body { padding: 0 16px 14px; }
    .badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 99px; letter-spacing: -0.1px; }
    .badge-green { background: var(--green-bg); color: var(--green); }
    .badge-red { background: var(--red-bg); color: var(--red); }

    .week-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 0.5px solid var(--hairline); }
    .week-row:last-child { border-bottom: none; }
    .week-row.current { background: var(--green-bg); }
    .week-row.skip { background: var(--red-bg); opacity: 0.7; }
    .week-date { font-size: 15px; font-weight: 600; }
    .week-meta { font-size: 12px; color: var(--muted); }
    .week-input { width: 82px; font-size: 17px; font-weight: 600; text-align: right; border: none; border-radius: var(--radius-sm); padding: 8px 10px; background: var(--card2); font-family: inherit; color: var(--ink); }
    .week-input:focus { outline: 2px solid var(--blue); }

    .flow-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 0.5px solid var(--hairline); font-size: 15px; }
    .flow-row:last-child { border-bottom: none; }
    .flow-label { color: var(--muted); }
    .flow-val { font-weight: 600; font-variant-numeric: tabular-nums; }
    .flow-val.neg { color: var(--red); }
    .flow-val.pos { color: var(--green); }
    .flow-val.amber { color: var(--amber); }

    .alert-card { border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; font-size: 14px; }
    .alert-card.warn { background: var(--amber-bg); color: #ffd591; }
    .alert-card.danger { background: var(--red-bg); color: #ffb3ad; }
    .alert-card.ok { background: var(--green-bg); color: #9be8ac; }
    .alert-title { font-weight: 600; margin-bottom: 3px; letter-spacing: -0.2px; color: var(--ink); }

    .progress-bar { height: 8px; background: var(--card2); border-radius: 99px; margin-top: 9px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--green); border-radius: 99px; transition: width 0.3s; }

    .sav-account { background: var(--card); border-radius: var(--radius); margin-bottom: 12px; padding: 16px; }
    .sav-head { display: flex; justify-content: space-between; align-items: baseline; }
    .sav-name { font-size: 16px; font-weight: 600; letter-spacing: -0.2px; }
    .sav-total { font-size: 22px; font-weight: 700; color: var(--green); letter-spacing: -0.4px; }
    .sav-goal { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .add-form { display: flex; gap: 8px; margin-top: 14px; }
    .add-input { flex: 1; font-size: 16px; border: none; border-radius: var(--radius-sm); padding: 10px 12px; background: var(--card2); font-family: inherit; color: var(--ink); min-width: 0; }
    .add-input:focus { outline: 2px solid var(--blue); }
    .add-btn { background: var(--blue); color: #fff; border: none; border-radius: var(--radius-sm); padding: 10px 18px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit; flex-shrink: 0; }
    .add-btn:active { opacity: 0.75; }
    .log-entry { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 0.5px solid var(--hairline); font-size: 15px; }
    .log-entry:last-child { border-bottom: none; }
    .log-date { color: var(--muted); font-size: 13px; }
    .log-amt { font-weight: 600; color: var(--green); }
    .del-btn { background: none; border: none; color: var(--red); font-size: 20px; cursor: pointer; padding: 0 4px; margin-left: 8px; }
    .log-empty { font-size: 13px; color: var(--muted); padding: 9px 0; }

    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-bottom: 0.5px solid var(--hairline); }
    .toggle-row:last-child { border-bottom: none; }
    .toggle-label { font-size: 15px; letter-spacing: -0.2px; }
    .toggle-amount { font-size: 15px; color: var(--muted); margin-left: auto; margin-right: 12px; }
    .toggle { width: 51px; height: 31px; background: var(--muted2); border-radius: 99px; position: relative; cursor: pointer; transition: background 0.25s; flex-shrink: 0; border: none; }
    .toggle.on { background: var(--green); }
    .toggle::after { content: ''; width: 27px; height: 27px; background: #fff; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: transform 0.25s cubic-bezier(0.4,0.9,0.5,1.2); box-shadow: 0 3px 8px rgba(0,0,0,0.15), 0 1px 1px rgba(0,0,0,0.16); }
    .toggle.on::after { transform: translateX(20px); }

    .reset-btn { width: 100%; padding: 15px; background: var(--card); color: var(--red); border: none; border-radius: var(--radius); font-size: 16px; font-weight: 500; cursor: pointer; margin-top: 12px; font-family: inherit; }
    .reset-btn:active { background: var(--card2); }
    .btn-add { font-size: 15px; font-weight: 500; background: none; color: var(--blue); border: none; padding: 6px 4px; cursor: pointer; font-family: inherit; flex-shrink: 0; }
    .btn-add:active { opacity: 0.5; }
    .month-total { display: flex; justify-content: space-between; align-items: center; padding: 10px 0 12px; margin-bottom: 6px; border-bottom: 0.5px solid var(--hairline); font-size: 15px; font-weight: 600; }
    .tl-month { background: var(--card); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
    .tl-head { display: flex; align-items: center; justify-content: space-between; padding: 15px 16px; cursor: pointer; }
    .tl-head:active { background: var(--card2); }
    .tl-month-name { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
    .tl-head-right { display: flex; align-items: center; gap: 10px; }
    .tl-close { font-size: 17px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.3px; }
    .tl-chev { font-size: 13px; color: var(--muted2); }
    .tl-body { padding: 0 16px 8px; }
    .tl-row { display: grid; grid-template-columns: 26px 22px 1fr auto auto; align-items: center; gap: 10px; padding: 10px 0; border-top: 0.5px solid var(--hairline); }
    .tl-bubble { width: 24px; height: 24px; border-radius: 50%; border: 1.8px solid var(--muted2); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: none; padding: 0; transition: all 0.15s; }
    .tl-bubble.done { background: var(--green); border-color: var(--green); }
    .tl-bubble.done::after { content: '✓'; color: #fff; font-size: 13px; font-weight: 700; }
    .tl-row.done .tl-label, .tl-row.done .tl-amt { text-decoration: line-through; opacity: 0.4; }
    .tl-row.done .tl-bal { opacity: 0.4; }
    .tl-row.paused .tl-label, .tl-row.paused .tl-amt { text-decoration: line-through; text-decoration-color: var(--red); color: var(--red); opacity: 0.85; }
    .tl-row.paused .tl-bal { opacity: 0.5; }
    .tl-paused-tag { font-size: 10px; color: var(--red); font-weight: 600; text-decoration: none; display: inline-block; margin-left: 4px; }
    .tl-day { font-size: 12px; color: var(--muted); font-weight: 600; text-align: center; }
    .tl-label { font-size: 15px; letter-spacing: -0.2px; }
    .tl-amt { font-size: 15px; font-weight: 600; font-variant-numeric: tabular-nums; text-align: right; }
    .tl-bal { font-size: 12px; font-variant-numeric: tabular-nums; text-align: right; min-width: 56px; color: var(--muted); }
  </style>
</head>
<body>

<div class="header">
  <h1>Budget</h1>
  <div class="header-sub">Paid Thursdays · Expense Account · Jun 2026 – Feb 2027</div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="dashboard" onclick="switchTab('dashboard')">
    <svg viewBox="0 0 24 24"><path d="M12 3.2 3 10.3v9.3c0 .6.5 1.1 1.1 1.1H9v-6h6v6h4.9c.6 0 1.1-.5 1.1-1.1v-9.3L12 3.2z"/></svg>Home</button>
  <button class="tab" data-tab="savings" onclick="switchTab('savings')">
    <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 3a7 7 0 110 14 7 7 0 010-14zm0 3a4 4 0 100 8 4 4 0 000-8zm0 2.6a1.4 1.4 0 110 2.8 1.4 1.4 0 010-2.8z"/></svg>Savings</button>
  <button class="tab" data-tab="weeks" onclick="switchTab('weeks')">
    <svg viewBox="0 0 24 24"><path d="M7 2v2H5.5A2.5 2.5 0 003 6.5v12A2.5 2.5 0 005.5 21h13a2.5 2.5 0 002.5-2.5v-12A2.5 2.5 0 0018.5 4H17V2h-2v2H9V2H7zm11.5 6v10.5a.5.5 0 01-.5.5H6a.5.5 0 01-.5-.5V8h13z"/></svg>Weeks</button>
  <button class="tab" data-tab="projection" onclick="switchTab('projection')">
    <svg viewBox="0 0 24 24"><path d="M4 3a1 1 0 00-1 1v15a2 2 0 002 2h15a1 1 0 100-2H5V4a1 1 0 00-1-1zm4 11a1 1 0 00-1 1v2a1 1 0 102 0v-2a1 1 0 00-1-1zm4-5a1 1 0 00-1 1v7a1 1 0 102 0v-7a1 1 0 00-1-1zm4-3a1 1 0 00-1 1v10a1 1 0 102 0V8a1 1 0 00-1-1z"/></svg>Plan</button>
  <button class="tab" data-tab="settings" onclick="switchTab('settings')">
    <svg viewBox="0 0 24 24"><path d="M12 8.5a3.5 3.5 0 100 7 3.5 3.5 0 000-7zm0 2a1.5 1.5 0 110 3 1.5 1.5 0 010-3zm-1-8.5-.4 2.3a7.7 7.7 0 00-1.6.9L6.8 4.3 4.3 6.8l1 2.1a7.7 7.7 0 00-.9 1.6L2 11v2l2.3.4c.2.6.5 1.1.9 1.6l-1 2.1 2.5 2.5 2.1-1c.5.4 1 .7 1.6.9L11 22h2l.4-2.3c.6-.2 1.1-.5 1.6-.9l2.1 1 2.5-2.5-1-2.1c.4-.5.7-1 .9-1.6L22 13v-2l-2.3-.4a7.7 7.7 0 00-.9-1.6l1-2.1-2.5-2.5-2.1 1a7.7 7.7 0 00-1.6-.9L13 2h-2z"/></svg>More</button>
</div>

<div id="dashboard" class="panel active"></div>
<div id="savings" class="panel"></div>
<div id="weeks" class="panel"></div>
<div id="projection" class="panel"></div>
<div id="settings" class="panel"></div>

<script>
const BILLS = [
  { id: 'gym', name: 'Gym', amount: 40, day: 1 },
  { id: 'monarch', name: 'Monarch Money', amount: 15, day: 23 },
  { id: 'loan101', name: 'Loan 1-101 (2.75%)', amount: 53, day: 12 },
  { id: 'loan102', name: 'Loan 1-102 (5.50%)', amount: 83, day: 12 },
  { id: 'loan103', name: 'Loan 1-103 min (6.53%)', amount: 88, day: 12 },
  { id: 'extra103', name: 'Extra → 1-103', amount: 520, day: 12 },
  { id: 'carins', name: 'Car insurance', amount: 500, day: 28 },
  { id: 'carpay', name: 'Car payment', amount: 415, day: 28 },
  { id: 'hysa', name: 'Amex HYSA', amount: 1000, day: 28 },
  { id: 'roth', name: 'Roth IRA', amount: 680, day: 28 },
  { id: 'brokerage', name: 'Brokerage', amount: 230, day: 28 }
];

const SAVINGS_ACCOUNTS = [
  { id: 'hysa', name: 'Amex HYSA (Unemployment)', goal: 8000 },
  { id: 'roth', name: 'Roth IRA', goal: 7000 },
  { id: 'brokerage', name: 'Brokerage', goal: 2000 },
  { id: 'loan103', name: 'Loan 1-103 Payoff (6.53%)', goal: 7305 },
  { id: 'loan102', name: 'Loan 1-102 Payoff (5.50%)', goal: 7383 },
  { id: 'loan101', name: 'Loan 1-101 Payoff (2.75%)', goal: 5340 }
];

const START = new Date(2026, 5, 25);
const SKIP_DATES = ['2026-12-31', '2027-01-07'];

function getThursdays() {
  const dates = [];
  const d = new Date(START);
  const end = new Date(2027, 1, 28);
  while (d <= end) { dates.push(new Date(d)); d.setDate(d.getDate() + 7); }
  return dates;
}
function fmt(d) { const m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return `${m[d.getMonth()]} ${d.getDate()}`; }
function fmtKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function money(n) { if (n < 0) return '-$' + Math.abs(Math.round(n)).toLocaleString(); return '$' + Math.round(n).toLocaleString(); }

function loadState() { try { const s = localStorage.getItem('budget_v2'); return s ? JSON.parse(s) : null; } catch { return null; } }
function saveState() { localStorage.setItem('budget_v2', JSON.stringify(state)); }

const defaults = {};
getThursdays().forEach(d => {
  const key = fmtKey(d);
  if (SKIP_DATES.includes(key)) defaults[key] = 0;
  else if (key === '2026-06-25') defaults[key] = 274;
  else defaults[key] = 838;
});
const defaultToggles = {};
getThursdays().forEach(d => {
  const mk = `${d.getFullYear()}-${d.getMonth()}`;
  if (!defaultToggles[mk]) {
    defaultToggles[mk] = {};
    BILLS.forEach(b => { defaultToggles[mk][b.id] = true; });
    if (d.getMonth() === 11 && d.getFullYear() === 2026) {
      defaultToggles[mk]['roth'] = false;
      defaultToggles[mk]['brokerage'] = false;
      defaultToggles[mk]['extra103'] = false;
    }
  }
});

let state = loadState() || { transfers: { ...defaults }, toggles: JSON.parse(JSON.stringify(defaultToggles)), contributions: [] };
if (!state.toggles) state.toggles = JSON.parse(JSON.stringify(defaultToggles));
if (!state.contributions) state.contributions = [];
if (state.startBalance === undefined) state.startBalance = 274;
if (!state.startDate) state.startDate = '2026-06-29';
if (!state.amounts) state.amounts = {};
if (!state.customGoals) state.customGoals = [];
if (!state.customBills) state.customBills = [];
if (!state.skips) state.skips = {};
if (!state.done) state.done = {};
if (!state.billMeta) state.billMeta = {};
if (!state.pauseMode) state.pauseMode = {};

if (!state.migratedFlexPause) {
  Object.keys(state.toggles || {}).forEach(mk => {
    if (mk === '2026-11') return;
    ['roth', 'brokerage', 'extra103'].forEach(bid => {
      if (state.toggles[mk] && state.toggles[mk][bid] === false) {
        state.toggles[mk][bid] = true;
      }
    });
  });
  state.migratedFlexPause = true;
  saveState();
}

const FLEX_BILLS = ['extra103', 'roth', 'brokerage'];
let openWeeks = new Set();
let openMonths = new Set();
let openPlanMonths = null;

function allSavingsAccounts() {
  return [...SAVINGS_ACCOUNTS, ...state.customGoals.map(g => ({ id: g.id, name: g.name, goal: g.target || null, custom: true }))];
}

function billsForMonth(year, month) {
  const mk = `${year}-${month}`;
  const recurring = state.customBills.filter(b => b.recurring);
  const oneOff = state.customBills.filter(b => !b.recurring && b.month === mk);
  return [...BILLS, ...recurring, ...oneOff].map(b => {
    const meta = state.billMeta[b.id];
    if (!meta) return b;
    return { ...b, name: meta.name !== undefined ? meta.name : b.name, day: meta.day !== undefined ? meta.day : b.day };
  }).sort((a, b) => a.day - b.day);
}

function paychecksInMonth(year, month) {
  return getThursdays().filter(d => d.getFullYear() === year && d.getMonth() === month && !SKIP_DATES.includes(fmtKey(d))).length;
}

function baseBillAmount(year, month, billId) {
  const mk = `${year}-${month}`;
  if (state.amounts[mk] && state.amounts[mk][billId] !== undefined) return state.amounts[mk][billId];
  const b = billsForMonth(year, month).find(x => x.id === billId);
  return b ? b.amount : 0;
}

function weekSlice(year, month, billId) {
  const pc = paychecksInMonth(year, month);
  return pc > 0 ? baseBillAmount(year, month, billId) / pc : 0;
}

function skippedWeeks(year, month, billId) {
  return getThursdays().filter(d => {
    if (d.getFullYear() !== year || d.getMonth() !== month) return false;
    const k = fmtKey(d);
    return state.skips[k] && state.skips[k].includes(billId);
  }).length;
}

function billAmount(year, month, billId) {
  const base = baseBillAmount(year, month, billId);
  if (!FLEX_BILLS.includes(billId)) return base;
  const adjusted = base - weekSlice(year, month, billId) * skippedWeeks(year, month, billId);
  return Math.max(0, adjusted);
}

function effectiveTransfer(d) {
  const k = fmtKey(d);
  let t = state.transfers[k] ?? 838;
  const y = d.getFullYear(), m = d.getMonth();
  const mk = `${y}-${m}`;
  const tog = state.toggles[mk] || {};
  const skipped = state.skips[k] || [];
  FLEX_BILLS.forEach(billId => {
    const monthPaused = tog[billId] === false;
    const weekSkipped = skipped.includes(billId);
    // A one-off weekly skip always keeps its slice in checking.
    if (weekSkipped) { t -= weekSlice(y, m, billId); return; }
    // A full-month pause keeps cash in checking ONLY when its mode is 'checking' (default).
    // In 'expense' mode transfers stay full, so the freed cash pools in the expense account.
    if (monthPaused) {
      const mode = (state.pauseMode[mk] && state.pauseMode[mk][billId]) || 'checking';
      if (mode === 'checking') t -= weekSlice(y, m, billId);
    }
  });
  return Math.max(0, t);
}

function savedTotal(accountId) {
  return state.contributions.filter(c => c.account === accountId).reduce((s, c) => s + c.amount, 0);
}

function getMonthBills(year, month) {
  const key = `${year}-${month}`;
  const t = state.toggles[key] || {};
  return billsForMonth(year, month).map(b => {
    const paused = t[b.id] === false;
    return { ...b, paused, amount: paused ? 0 : billAmount(year, month, b.id) };
  });
}

function simulate() {
  const thursdays = getThursdays();
  const events = [];
  let balance = state.startBalance || 0;
  const startD = new Date((state.startDate || '2026-06-29') + 'T00:00:00');
  const months = new Set();
  thursdays.forEach(d => {
    const key = fmtKey(d);
    const amt = effectiveTransfer(d);
    const skip = SKIP_DATES.includes(key);
    events.push({ date: new Date(d), type: 'paycheck', amount: amt, skip, key });
    months.add(`${d.getFullYear()}-${d.getMonth()}`);
  });
  months.forEach(mk => {
    const [y, m] = mk.split('-').map(Number);
    getMonthBills(y, m).forEach(b => {
      const dueDate = new Date(y, m, b.day);
      const ek = `${fmtKey(dueDate)}|${b.id}`;
      let postDate = dueDate;
      let paidEarly = false;
      if (state.done && state.done[ek] && !b.paused) {
        const today = new Date(); today.setHours(0, 0, 0, 0);
        if (dueDate > today) { postDate = today; paidEarly = true; }
      }
      events.push({ date: postDate, dueDate, type: 'bill', bill: b, amount: -b.amount, paused: b.paused, paidEarly });
    });
  });
  events.sort((a, b) => {
    const diff = a.date - b.date;
    if (diff !== 0) return diff;
    if (a.type === 'paycheck' && b.type === 'bill') return -1;
    if (a.type === 'bill' && b.type === 'paycheck') return 1;
    return 0;
  });
  const result = [];
  events.forEach(e => {
    if (e.skip) return;
    if (e.date < startD) return;
    balance += e.amount;
    result.push({ ...e, balance });
  });
  return { events: result };
}

function findCurrentWeek() {
  const now = new Date();
  const thursdays = getThursdays();
  for (let i = thursdays.length - 1; i >= 0; i--) if (now >= thursdays[i]) return i;
  return 0;
}

      </div></div>`;
    } else {

function addGoal() {
  const name = prompt('Goal name (e.g. Vacation):');
  if (!name) return;
  const targetRaw = prompt('Target amount? Leave blank for an open-ended goal (no target).');
  let target = null;
  if (targetRaw && targetRaw.trim() !== '') {
    const t = parseFloat(targetRaw);
    if (!isNaN(t) && t > 0) target = t;
  }
  state.customGoals.push({ id: 'g' + Date.now() + Math.random().toString(36).slice(2,6), name, target });
  saveState();
  renderSavings();
  renderDashboard();
}

function delGoal(id) {
  if (!confirm('Delete this goal? Its logged contributions will also be removed.')) return;
  state.customGoals = state.customGoals.filter(g => g.id !== id);
  state.contributions = state.contributions.filter(c => c.account !== id);
  saveState();
  renderSavings();
  renderDashboard();
}

function addContribution(accountId) {
  const amtInput = document.getElementById('amt-' + accountId);
  const dateInput = document.getElementById('date-' + accountId);
  const amount = parseFloat(amtInput.value);
  if (isNaN(amount) || amount === 0) { amtInput.focus(); return; }
  state.contributions.push({ id: 'c' + Date.now() + Math.random().toString(36).slice(2,6), account: accountId, amount, date: dateInput.value || fmtKey(new Date()) });
  saveState();
  amtInput.value = '';
  renderSavings();
}

function delContribution(id) {
  state.contributions = state.contributions.filter(c => c.id !== id);
  saveState();
  renderSavings();
}

function renderWeeks() {
  const el = document.getElementById('weeks');
  const thursdays = getThursdays();
  const cwi = findCurrentWeek();
  const mn = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let html = '<div class="section-title">Weekly Transfers</div><p style="font-size:13px;color:var(--muted);margin-bottom:12px;padding:0 6px">Tap a week to skip a flexible bill\'s slice that week — keeps that cash in checking and trims the month\'s bill. The bill still pays on its due date, just one slice short.</p>';

  let pastHtml = '';
  let pastCount = 0;

  thursdays.forEach((d, i) => {
    const key = fmtKey(d);
    const skip = SKIP_DATES.includes(key);
    const y = d.getFullYear(), m = d.getMonth();
    const baseT = state.transfers[key] ?? 838;
    const effT = effectiveTransfer(d);
    const isCurrent = i === cwi;
    const isPast = i < cwi;
    const label = `${mn[m]} ${d.getDate()}`;
    const skipsThisWeek = state.skips[key] || [];
    const isOpen = openWeeks.has(key);
    let cardHtml = '';

    if (skip) {
      cardHtml = `<div class="card"><div class="card-header" style="cursor:default"><span class="card-title">${label}</span><span class="badge badge-red">No Pay</span></div></div>`;
      if (isPast) { pastHtml += cardHtml; pastCount++; } else { html += cardHtml; }
      return;
    }

    const headerBg = isCurrent ? 'background:var(--green-bg)' : '';
    cardHtml += `<div class="card"><div class="card-header" style="${headerBg}" onclick="toggleWeek('${key}', this)">
      <span class="card-title">${label}${isCurrent ? ' ←' : ''}</span>
      <span style="text-align:right">
        <span style="font-size:16px;font-weight:700">${money(effT)}</span>
        ${effT !== baseT ? `<span style="font-size:12px;color:var(--amber);display:block">was ${money(baseT)}</span>` : ''}
      </span>
    </div><div class="card-body" style="display:${isOpen ? 'block' : 'none'}">
      <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--hairline)">
        <span style="font-size:15px;flex:1">Full transfer this week</span>
        <span style="font-size:14px;color:var(--muted)">$</span>
        <input class="week-input" type="number" value="${baseT}" data-key="${key}" onchange="updateTransfer(this)" min="0" max="1038" style="width:82px">
      </div>`;

    if (paychecksInMonth(y, m) >= 2) {
      cardHtml += `<div style="font-size:12px;color:var(--muted);padding:12px 0 4px">Skip a flexible bill this week</div>`;
      FLEX_BILLS.forEach(bid => {
        const bill = billsForMonth(y, m).find(b => b.id === bid);
        if (!bill) return;
        const slice = weekSlice(y, m, bid);
        const monthPaused = (state.toggles[`${y}-${m}`] || {})[bid] === false;
        const isSkipped = skipsThisWeek.includes(bid);
        if (monthPaused) {
          const mode = (state.pauseMode[`${y}-${m}`] && state.pauseMode[`${y}-${m}`][bid]) || 'checking';
          const note = mode === 'checking' ? `paused · ${money(slice)}/wk to checking` : 'paused · stays in expense acct';
          cardHtml += `<div class="toggle-row" style="opacity:0.7">
            <span class="toggle-label" style="flex:1">${bill.name}</span>
            <span style="font-size:13px;color:var(--amber);margin-right:10px">${note}</span>
            <button class="toggle on" disabled style="opacity:0.55;cursor:default"></button>
          </div>`;
          return;
        }
        cardHtml += `<div class="toggle-row">
          <span class="toggle-label" style="flex:1">${bill.name}</span>
          <span style="font-size:13px;color:var(--muted);margin-right:10px">${isSkipped ? 'skipping ' : ''}${money(slice)}/wk</span>
          <button class="toggle ${isSkipped ? 'on' : ''}" data-key="${key}" data-bill="${bid}" onclick="toggleSkip(this)"></button>
        </div>`;
      });
      cardHtml += `<div style="font-size:13px;color:var(--green);font-weight:600;padding-top:10px">Keep $${Math.round(1038 - effT)} in checking this week</div>`;
    } else {
      cardHtml += `<div style="font-size:13px;color:var(--muted);padding:10px 0 2px">Seed week — funds the start of next month. No flexible-bill skips here.</div>`;
    }

    cardHtml += `</div></div>`;
    if (isPast) { pastHtml += cardHtml; pastCount++; } else { html += cardHtml; }
  });

  if (pastCount > 0) {
    const open = openWeeks.has('__past__');
    const folder = `<div class="card"><div class="card-header" onclick="toggleWeek('__past__', this)">
      <span class="card-title" style="color:var(--muted)">Previous Weeks</span>
      <span class="tl-head-right"><span style="font-size:13px;color:var(--muted)">${pastCount}</span><span class="tl-chev">${open ? '▾' : '▸'}</span></span>
    </div><div class="card-body" style="display:${open ? 'block' : 'none'};padding:0 0 4px">${pastHtml}</div></div>`;
    html = html.replace('</p>', '</p>' + folder);
  }

  el.innerHTML = html;
}

function toggleWeek(key, headerEl) {
  if (openWeeks.has(key)) openWeeks.delete(key);
  else openWeeks.add(key);
  const body = headerEl.nextElementSibling;
  const open = openWeeks.has(key);
  body.style.display = open ? 'block' : 'none';
  const chev = headerEl.querySelector('.tl-chev');
  if (chev) chev.textContent = open ? '▾' : '▸';
}

function toggleSkip(btn) {
  const key = btn.dataset.key, bid = btn.dataset.bill;
  if (!state.skips[key]) state.skips[key] = [];
  const idx = state.skips[key].indexOf(bid);
  if (idx > -1) state.skips[key].splice(idx, 1);
  else state.skips[key].push(bid);
  if (state.skips[key].length === 0) delete state.skips[key];
  openWeeks.add(key);
  saveState();
  renderWeeks();
  renderDashboard();
  renderProjection();
}

function renderProjection() {
  const el = document.getElementById('projection');
  const sim = simulate();
  const mn = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  const byMonth = {};
  sim.events.forEach(e => {
    const groupDate = e.type === 'bill' ? e.dueDate : e.date;
    const mk = `${groupDate.getFullYear()}-${groupDate.getMonth()}`;
    if (!byMonth[mk]) byMonth[mk] = [];
    byMonth[mk].push(e);
  });

  const now = new Date();
  const curMk = `${now.getFullYear()}-${now.getMonth()}`;
  if (openPlanMonths === null) { openPlanMonths = new Set([curMk]); }
  let html = '<div class="section-title">Expense Account Timeline</div>';

  Object.keys(byMonth).forEach(mk => {
    const [y, m] = mk.split('-').map(Number);
    const events = byMonth[mk];
    const closeBal = events.reduce((acc, e) => (e.date >= acc.date ? e : acc), events[0]).balance;
    const closeColor = closeBal < 0 ? 'var(--red)' : closeBal < 50 ? 'var(--amber)' : 'var(--green)';
    const isOpen = openPlanMonths.has(mk);

    html += `<div class="tl-month">
      <div class="tl-head" onclick="togglePlanMonth('${mk}', this)">
        <span class="tl-month-name">${mn[m]} ${y}</span>
        <span class="tl-head-right">
          <span class="tl-close" style="color:${closeColor}">${money(closeBal)}</span>
          <span class="tl-chev">${isOpen ? '▾' : '▸'}</span>
        </span>
      </div>
      <div class="tl-body" style="display:${isOpen ? 'block' : 'none'}">`;

    events.forEach(e => {
      const isIn = e.amount >= 0;
      const label = e.type === 'paycheck' ? 'Paycheck' : (e.bill ? e.bill.name : '');
      const balColor = e.balance < 0 ? 'var(--red)' : e.balance < 50 ? 'var(--amber)' : 'var(--muted)';
      const dueDay = (e.type === 'bill' ? e.dueDate : e.date).getDate();
      const ek = e.type === 'paycheck' ? `${e.key}|pay` : `${fmtKey(e.dueDate)}|${e.bill ? e.bill.id : 'x'}`;
      const isDone = state.done && state.done[ek];

      if (e.paused) {
        html += `<div class="tl-row paused">
          <span></span>
          <span class="tl-day">${dueDay}</span>
          <span class="tl-label">${label}<span class="tl-paused-tag">PAUSED</span></span>
          <span class="tl-amt">−${money(baseBillAmount(e.dueDate.getFullYear(), e.dueDate.getMonth(), e.bill.id))}</span>
          <span class="tl-bal">${money(e.balance)}</span>
        </div>`;
        return;
      }

      let paused = '';
      if (e.type === 'paycheck') {
        const baseT = state.transfers[e.key] ?? 838;
        if (e.amount < baseT - 0.5) paused = ` <span style="font-size:9px;color:var(--amber)">−${money(baseT - e.amount)} paused</span>`;
      } else if (e.bill && FLEX_BILLS.includes(e.bill.id)) {
        const base = baseBillAmount(e.dueDate.getFullYear(), e.dueDate.getMonth(), e.bill.id);
        if (Math.abs(e.amount) < base - 0.5) paused = ` <span style="font-size:9px;color:var(--amber)">−${money(base - Math.abs(e.amount))} paused</span>`;
      }
      const earlyTag = e.paidEarly ? ` <span style="font-size:9px;color:var(--green)">paid early ${mn[e.date.getMonth()]} ${e.date.getDate()}</span>` : '';
      html += `<div class="tl-row ${isDone ? 'done' : ''}">
        <button class="tl-bubble ${isDone ? 'done' : ''}" onclick="toggleDone('${ek}', this)"></button>
        <span class="tl-day">${dueDay}</span>
        <span class="tl-label">${label}${paused}${earlyTag}</span>
        <span class="tl-amt" style="color:${isIn ? 'var(--green)' : 'var(--ink)'}">${isIn ? '+' : '−'}${money(Math.abs(e.amount))}</span>
        <span class="tl-bal" style="color:${balColor}">${money(e.balance)}</span>
      </div>`;
    });

    html += `</div></div>`;
  });

  el.innerHTML = html;
}

function togglePlanMonth(mk, headerEl) {
  if (openPlanMonths === null) openPlanMonths = new Set();
  if (openPlanMonths.has(mk)) openPlanMonths.delete(mk);
  else openPlanMonths.add(mk);
  const body = headerEl.nextElementSibling;
  const open = openPlanMonths.has(mk);
  body.style.display = open ? 'block' : 'none';
  headerEl.querySelector('.tl-chev').textContent = open ? '▾' : '▸';
}
function toggleDone(ek, btn) {
  if (state.done[ek]) delete state.done[ek];
  else state.done[ek] = true;
  saveState();
  renderDashboard();
  renderProjection();
}

function renderSettings() {

  const months = [];
  for (let m = 6; m <= 11; m++) months.push({ y: 2026, m });

  let html = '<div class="section-title">Starting Balance</div><p style="font-size:13px;color:var(--muted);margin-bottom:12px;padding:0 6px">What\'s actually in your expense account, and the date that reflects. The projection builds forward from here. Events before this date are excluded (already paid).</p>';
  html += `<div class="card"><div style="padding:14px 16px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <span style="font-size:15px;font-weight:600;flex:1">Balance today</span>
      <span style="font-size:15px;color:var(--muted)">$</span>
      <input class="week-input" type="number" id="startBal" value="${state.startBalance ?? 274}" onchange="updateStart()" style="width:100px">
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:15px;font-weight:600;flex:1">As of date</span>

    </div>
  </div></div>`;

  html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:18px 6px 7px"><span class="section-title" style="padding:0">Monthly Bills</span><button class="btn-add" onclick="addCustomBill()">+ Bill</button></div><p style="font-size:13px;color:var(--muted);margin-bottom:12px;padding:0 6px">Toggle bills on/off and set custom amounts per month. Bills are ordered by due date. Pausing a flexible bill lets you send the freed cash to checking or leave it in the expense account. Tap Edit under any default bill to rename it or change its due date. Paused bills show red-lined in the Plan timeline. Custom bills can be recurring or one-off.</p>';
  months.forEach(({ y, m }) => {
    const mk = `${y}-${m}`;
    if (!state.toggles[mk]) { state.toggles[mk] = {}; }
    const monthBills = billsForMonth(y, m);
    let monthTotal = 0;
    monthBills.forEach(b => { if ((state.toggles[mk][b.id]) !== false) monthTotal += billAmount(y, m, b.id); });
    const isOpen = openMonths.has(mk);
    html += `<div class="card"><div class="card-header" onclick="toggleMonthCard('${mk}', this)"><span class="card-title">${mn[m]} ${y}</span><span style="font-size:15px;font-weight:700;color:var(--green)">${money(monthTotal)}/mo</span></div><div class="card-body" style="display:${isOpen ? 'block' : 'none'}">`;
    html += `<div class="month-total"><span>Total active bills</span><span style="color:var(--green)">${money(monthTotal)}</span></div>`;
    monthBills.forEach(b => {
      const on = state.toggles[mk][b.id] !== false;
      const amt = billAmount(y, m, b.id);
      const isCustom = state.amounts[mk] && state.amounts[mk][b.id] !== undefined;
      const isDefault = !b.recurring && !b.month;
      const tag = b.recurring ? ' <span style="font-size:10px;color:var(--blue)">RECURRING</span>' : (b.month ? ' <span style="font-size:10px;color:var(--amber)">ONE-OFF</span>' : '');
      const delBtn = (b.recurring || b.month) ? ` <button class="del-btn" style="font-size:16px" onclick="delCustomBill('${b.id}')">×</button>` : '';
      const metaEdited = isDefault && state.billMeta[b.id] && (state.billMeta[b.id].name !== undefined || state.billMeta[b.id].day !== undefined);
      const ord = (n) => { const s = ['th','st','nd','rd'], v = n % 100; return n + (s[(v-20)%10] || s[v] || s[0]); };
      const sub = isDefault
        ? `<div style="font-size:12px;color:var(--muted);margin-top:2px">Due the ${ord(b.day)}${metaEdited ? ' <span style="color:var(--amber)">· edited</span>' : ''} <button onclick="editBill('${b.id}')" style="background:none;border:none;color:var(--blue);font-size:12px;font-weight:500;cursor:pointer;padding:0 0 0 4px;font-family:inherit">Edit</button></div>`
        : '';
      let freed = '';
      if (!on && FLEX_BILLS.includes(b.id)) {
        const mode = (state.pauseMode[mk] && state.pauseMode[mk][b.id]) || 'checking';
        const pill = (val, lbl) => `<button onclick="setPauseMode('${mk}','${b.id}','${val}')" style="font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;border:none;border-radius:99px;padding:3px 10px;margin-right:6px;${mode===val?'background:var(--blue);color:#fff':'background:var(--card2);color:var(--muted)'}">${lbl}</button>`;
        freed = `<div style="margin-top:6px">
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Freed cash goes to</div>
          ${pill('checking','Checking')}${pill('expense','Expense acct')}
        </div>`;
      }
      html += `<div class="toggle-row">
        <span style="flex:1">
          <span class="toggle-label">${b.name}${tag}${isCustom ? ' <span style="font-size:11px;color:var(--amber)">●</span>' : ''}${delBtn}</span>
          ${sub}
          ${freed}
        </span>
        <span style="font-size:14px;color:var(--muted);margin-right:6px">$</span>
        <input class="week-input" type="number" value="${amt}" data-month="${mk}" data-bill="${b.id}" onchange="updateBillAmount(this)" style="width:72px;margin-right:10px">
        <button class="toggle ${on ? 'on' : ''}" data-month="${mk}" data-bill="${b.id}" onclick="toggleBill(this)"></button>
      </div>`;
    });
    html += '</div></div>';
  });
  html += `<div class="section-title" style="margin-top:20px">Data</div>
    <button class="reset-btn" onclick="if(confirm('Reset transfers, toggles, custom amounts, custom bills, bill name/date edits, pause settings, and weekly skips? Your savings goals and logged contributions will be kept.')){state.transfers={...defaults};state.toggles=JSON.parse(JSON.stringify(defaultToggles));state.amounts={};state.customBills=[];state.skips={};state.billMeta={};state.pauseMode={};saveState();renderDashboard();renderProjection();renderSettings();alert('Reset done.');}">Reset Plan to Defaults</button>
    <button class="reset-btn" onclick="if(confirm('Delete ALL logged savings contributions? This cannot be undone.')){state.contributions=[];saveState();renderDashboard();renderSavings();alert('Contributions cleared.');}">Clear All Contributions</button>`;
  el.innerHTML = html;
}

function updateTransfer(input) {
  state.transfers[input.dataset.key] = Math.max(0, Math.min(1038, parseInt(input.value) || 0));
  saveState();
  renderDashboard();
  renderProjection();
  renderWeeks();
}
function updateStart() {
  const bal = parseFloat(document.getElementById('startBal').value);
  const dt = document.getElementById('startDate').value;
  if (!isNaN(bal)) state.startBalance = bal;
  if (dt) state.startDate = dt;
  saveState();
  renderDashboard();
  renderProjection();
}
function toggleBill(btn) {
  const mk = btn.dataset.month, bid = btn.dataset.bill;
  if (!state.toggles[mk]) state.toggles[mk] = {};
  state.toggles[mk][bid] = state.toggles[mk][bid] === false ? true : false;
  btn.classList.toggle('on');
  openMonths.add(mk);
  saveState();
  renderDashboard();
  renderProjection();
  renderWeeks();
  renderSettings();
}
function toggleMonthCard(mk, headerEl) {
  if (openMonths.has(mk)) openMonths.delete(mk);
  else openMonths.add(mk);
  const body = headerEl.nextElementSibling;
  body.style.display = openMonths.has(mk) ? 'block' : 'none';
}
function setPauseMode(mk, bid, mode) {
  if (!state.pauseMode[mk]) state.pauseMode[mk] = {};
  state.pauseMode[mk][bid] = mode;
  openMonths.add(mk);
  saveState();
  renderDashboard();
  renderProjection();
  renderWeeks();
  renderSettings();
}
function editBill(billId) {
  const base = BILLS.find(b => b.id === billId);
  if (!base) return;
  const meta = state.billMeta[billId] || {};
  const curName = meta.name !== undefined ? meta.name : base.name;
  const curDay = meta.day !== undefined ? meta.day : base.day;
  const newName = prompt('Bill name:', curName);
  if (newName === null) return;
  const dayRaw = prompt('Day of month it\'s due (1-28):', String(curDay));
  if (dayRaw === null) return;
  let day = parseInt(dayRaw);
  if (isNaN(day) || day < 1) day = 1;
  if (day > 28) day = 28;
  if (!state.billMeta[billId]) state.billMeta[billId] = {};
  const nm = newName.trim();
  if (nm === '' || nm === base.name) delete state.billMeta[billId].name;
  else state.billMeta[billId].name = nm;
  if (day === base.day) delete state.billMeta[billId].day;
  else state.billMeta[billId].day = day;
  if (Object.keys(state.billMeta[billId]).length === 0) delete state.billMeta[billId];
  saveState();
  renderDashboard();
  renderProjection();
  renderSettings();
}
function addCustomBill() {
  const name = prompt('Bill name (e.g. Phone):');
  if (!name) return;
  const amtRaw = prompt('Amount ($):');
  const amount = parseFloat(amtRaw);
  if (isNaN(amount)) return;
  const dayRaw = prompt('Day of month it\'s due (1-28):');
  let day = parseInt(dayRaw);
  if (isNaN(day) || day < 1) day = 1;
  if (day > 28) day = 28;
  const rec = prompt('Type R for recurring every month, or O for one-off (just one month):', 'R');
  const recurring = !rec || rec.trim().toUpperCase().startsWith('R');
  const bill = { id: 'cb' + Date.now() + Math.random().toString(36).slice(2,6), name, amount, day, recurring };
  if (!recurring) {
    const monthRaw = prompt('Which month? Type like "Aug 2026" or "8/2026":');
    if (!monthRaw) { alert('No month entered. Bill not added.'); return; }
    const mnames = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    let mIdx = -1, yr = -1;
    const s = monthRaw.trim().toLowerCase();
    const slash = s.match(/^(\d{1,2})\s*[\/\-]\s*(\d{4})$/);
    if (slash) { mIdx = parseInt(slash[1]) - 1; yr = parseInt(slash[2]); }
    else {
      const parts = s.split(/\s+/);
      if (parts.length === 2) {
        mIdx = mnames.findIndex(n => parts[0].startsWith(n));
        yr = parseInt(parts[1]);
      }
    }
    if (mIdx < 0 || mIdx > 11 || isNaN(yr)) { alert('Could not read that month. Bill not added.'); return; }
    bill.month = `${yr}-${mIdx}`;
  }
  state.customBills.push(bill);
  saveState();
  renderDashboard();
  renderProjection();
  renderSettings();
}
function delCustomBill(id) {
  if (!confirm('Delete this custom bill?')) return;
  state.customBills = state.customBills.filter(b => b.id !== id);
  saveState();
  renderDashboard();
  renderProjection();
  renderSettings();
}
function updateBillAmount(input) {
  const mk = input.dataset.month, bid = input.dataset.bill;
  const val = parseFloat(input.value);
  if (!state.amounts[mk]) state.amounts[mk] = {};
  if (isNaN(val)) { delete state.amounts[mk][bid]; }
  else { state.amounts[mk][bid] = val; }
  openMonths.add(mk);
  saveState();
  renderDashboard();
  renderProjection();
  renderSettings();
}
function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`[data-tab="${id}"]`).classList.add('active');
  document.getElementById(id).classList.add('active');
  if (id === 'savings') renderSavings();
  if (id === 'weeks') renderWeeks();
  if (id === 'projection') renderProjection();
  if (id === 'settings') renderSettings();
  if (id === 'dashboard') renderDashboard();
}

renderDashboard();
</script>
</body>
</html>
